server {
    server_name %CONTENT_SITE_NAME%;

    root %APP_DIR%/temp/content;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:4433 ssl ipv6only=on;
    listen 4433 ssl;
    ssl_certificate /etc/letsencrypt/live/%CONTENT_SITE_NAME%/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/%CONTENT_SITE_NAME%/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = %CONTENT_SITE_NAME%) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name %CONTENT_SITE_NAME%;
    return 404; # managed by Certbot
}